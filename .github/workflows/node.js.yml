name: CI test

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 14

      - name: Install Dependencies
        run: npm install

      - name: Dedjustded
        run: echo "dedjustded: ${{ secrets.dedjustded }}"
        env:
          SOFTUNI_USERNAME: ${{ secrets.dedjustded }}

      - name: Build and Test
        run: npm run test:ui
